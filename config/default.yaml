# ===========================================================================
# Default, non-secret configuration. Secrets come from environment variables
# (see .env.example). Override locally by creating config/local.yaml (git-ignored)
# which is shallow-merged on top of this file, or point WCK_CONFIG at another file.
# ===========================================================================

# paper | demo | live   (env WCK_MODE overrides this)
mode: paper

app:
  log_level: INFO
  log_format: json            # json | console
  data_dir: ./data
  db_url: "sqlite:///./data/wck.sqlite3"

kalshi:
  environment: demo           # demo | prod -> selects which base URLs below are used
  rest_base_demo: "https://external-api.demo.kalshi.co/trade-api/v2"
  ws_base_demo: "wss://external-api-ws.demo.kalshi.co/trade-api/ws/v2"
  rest_base_prod: "https://external-api.kalshi.com/trade-api/v2"
  ws_base_prod: "wss://external-api-ws.kalshi.com/trade-api/ws/v2"
  # Best-guess WC series ticker; discovered/overridden at runtime (see research.md §1.7).
  worldcup_series_ticker: "KXWORLDCUP"
  poll_interval_seconds: 2.0
  request_timeout_seconds: 10.0
  max_retries: 4
  # Fee model (research.md §1.6). taker_fee = ceil(coeff * C * P * (1-P) * 100)/100.
  fee_coefficient: 0.07
  maker_fee_fraction: 0.25

football:
  provider: simulated         # simulated | apifootball | thestatsapi
  poll_interval_seconds: 15.0
  apifootball_base: "https://v3.football.api-sports.io"
  thestatsapi_base: "https://api.thestatsapi.com"
  request_timeout_seconds: 10.0
  max_retries: 3
  # Simulated-feed knobs (used only when provider == simulated)
  sim_tick_seconds: 1.0       # wall-clock seconds between simulated ticks
  sim_minutes_per_tick: 1.0   # match-minutes advanced per tick
  sim_seed: 42
  # Shared request budget across all live football polling (paid tier = 75k/day).
  daily_request_budget: 75000
  # Adaptive polling: fast when a live match is close & late, slow when idle.
  adaptive_polling: true
  poll_interval_fast_seconds: 4.0
  poll_interval_idle_seconds: 30.0
  # Simulated-market xG awareness: 0 = blind (original), 1 = fully prices live xG.
  sim_market_xg_awareness: 0.0

consensus:
  polymarket_enabled: false
  polymarket_gamma_base: "https://gamma-api.polymarket.com"

model:
  name: dixon_coles_inplay
  base_home_xg: 1.45          # league-average full-match home expected goals
  base_away_xg: 1.20          # league-average full-match away expected goals
  home_advantage: 0.20        # multiplicative bump applied to home rate
  draw_rho: -0.05             # Dixon-Coles low-score dependence correction
  # Live blending: how much weight to put on observed live xG vs the prior rate
  # when projecting remaining-match goals. 0 = ignore live xG, 1 = trust it fully.
  live_xg_weight: 0.6
  red_card_xg_penalty: 0.55   # multiply a team's remaining rate by this per net red card
  max_goals: 12               # truncation for the scoreline distribution
  # Behavioural constants (fit via `wck fit`, see modeling/fit.py). Config-driven so
  # they are no longer hard-coded magic numbers.
  elo_tilt: 0.25              # how strongly Elo diff tilts the prior scoring split
  leader_mult: 0.97          # remaining-rate multiplier for the leading team
  chaser_mult: 1.06          # remaining-rate multiplier for the chasing team

edge:
  min_edge: 0.05              # raw |model - market| threshold (probability points)
  min_edge_after_costs: 0.03  # required edge AFTER subtracting fees+spread+slippage
  slippage_cents: 1           # assumed adverse slippage per contract, in cents
  devig_method: proportional  # proportional | shin | power

risk:
  starting_bankroll: 1000.0   # paper/demo notional bankroll for Kelly sizing
  kelly_fraction: 0.25        # fractional Kelly (NEVER 1.0)
  max_position_per_market: 100      # contracts, absolute cap per market
  max_exposure_per_match: 200.0     # dollars at risk per match
  max_total_open_exposure: 1000.0   # dollars across all matches
  max_daily_loss: 250.0             # dollars; breaching halts trading for the day
  min_price: 0.03                   # do not trade outside [min,max] price (illiquid tails)
  max_price: 0.97
  min_order_contracts: 1
  position_stop_loss: 0.0           # flatten a market past this fraction of cost lost (0=off)

execution:
  # autonomous = system auto-executes actionable edges; advisory = it proposes trades
  # and waits for you to Approve/Reject in the web dashboard. (CLI: --advisory / --autonomous)
  decision_mode: autonomous
  proposal_ttl_seconds: 120   # advisory: a pending proposal expires if not acted on
  paper_fill_model: cross_spread  # cross_spread (fill at our limit, realistic) | midpoint (optimistic)
  live_confirmed: false       # MUST be true (and WCK_ALLOW_LIVE=true) to ever trade live
  audit_log_path: ./data/audit.jsonl
  order_time_in_force: ioc     # ioc | gtc (paper/demo)
  order_type: limit            # limit | market (demo/live)
  min_retrade_minutes: 8       # min match-minutes between entries in the same market
  one_trade_per_match_tick: true  # joint 1X2: act on only the strongest leg per tick
  max_adverse_cents: 3         # skip if price moved this many cents against the signal (0=off)
  late_taper_minutes: 15       # shrink size as minutes_remaining falls below this (0=off)
  late_taper_floor: 0.34       # floor for the late-game size taper
  flatten_on_kill: true        # kill switch places closing orders to flatten inventory
  resting_timeout_seconds: 30.0  # cancel unfilled resting orders after this long (live)

dashboard:
  host: "127.0.0.1"
  port: 8000

alerts:
  enabled: true
  console: true
  webhook: false              # POST to ALERTS_WEBHOOK_URL if true
  discord: false              # POST to DISCORD_WEBHOOK_URL if true
  telegram: false             # send via TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID if true
  email: false                # send via SMTP_* env if true
  on_goal: true
  on_red_card: true
  on_guardrail: true
  on_proposal: true
  on_fill: true
  divergence_threshold: 0.08  # alert when |model - market| exceeds this
